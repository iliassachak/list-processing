<div
  style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)">
  <div class="card" style="width:400px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:48px;margin-bottom:8px">📋</div>
      <h1 style="font-size:24px;font-weight:700">List Processing</h1>
      <p style="color:#6b7280;margin-top:4px">Connectez-vous pour continuer</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input class="form-control" formControlName="username" placeholder="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" type="password" formControlName="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%" type="submit" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
      <div style="text-align:center;font-size:14px;color:#6b7280;margin-top:12px">
        Pas encore de compte ?
        <a routerLink="/register" style="color:#4f46e5;font-weight:500;text-decoration:none">
          S'inscrire
        </a>
      </div>
    </form>
  </div>
</div>
